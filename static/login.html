<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css?v=3" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.7-5.6L20 8"/><path d="M20 4v4h-4"/><path d="M20 12a8 8 0 0 1-13.7 5.6L4 16"/><path d="M4 20v-4h4"/></svg>
      </span>
      <span class="name">AgentSync</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle" id="auth-subtitle">Loading…</p>
    <form id="auth-form">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required />
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required />
      <div id="auth-error" class="status error"></div>
      <button type="submit" class="btn btn-block" id="auth-submit">…</button>
    </form>
    <div class="auth-foot">shared memory across Claude Code + Codex</div>
  </div>
</div>
<script src="/static/login.js?v=3"></script>
</body>
</html>
